spring:
  config:
    import: "optional:file:.env[.properties]"
  autoconfigure:
    exclude:
      - dev.langchain4j.googleaigemini.spring.AutoConfig
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rag}
    username: ${DATABASE_USERNAME:rag}
    password: ${DATABASE_PASSWORD:rag}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

app:
  llm:
    enabled: ${APP_LLM_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_AI_KEY:dummy}
      model-name: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
    embedding-model:
      api-key: ${GEMINI_AI_KEY:dummy}
      model-name: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}
      output-dimensionality: 1536
